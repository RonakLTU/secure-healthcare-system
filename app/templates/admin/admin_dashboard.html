{% extends "base.html" %}

{% block content %}

<div class="admin-dashboard">

<div class="admin-left">
    <h2>Admin Panel</h2>
   
    {% if msg == "created" %}
    <div id="successMsg" class="success-banner">
        Clinician account created successfully
    </div>

    <script>
    setTimeout(function(){
        var msg = document.getElementById("successMsg");
        if(msg){
            msg.style.display = "none";
        }
    }, 1000); // 2 seconds
    </script>

    {% endif %}


    <p>Manage system users and clinicians</p>

    <a href="/create_clinician" class="admin-btn">Create Clinician</a>
    <a href="/manage_users" class="admin-btn">Manage Users</a>
    <a href="/patient_users" class="admin-btn">Patient Users</a>
</div>

<div class="admin-right">
    <img src="{{ url_for('static', filename='img/admin.png') }}">
</div>

</div>

{% endblock %}
