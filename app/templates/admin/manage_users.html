{% extends "base.html" %}

{% block content %}

<div class="users-container">

<h2>System Users</h2>

<table class="users-table">

<tr>
<th>ID</th>
<th>Clinician ID</th>
<th>Name</th>
<th>Email</th>
<th>Role</th>
<th>Action</th>
</tr>

{% for user in users %}

<tr>

<td>{{ loop.index }}</td>
<td>{{ user.clinician_id }}</td>
<td>{{ user.name }}</td>
<td>{{ user.email }}</td>
<td>{{ user.role }}</td>

<td>

{% if user.role != "admin" %}

<a href="#" onclick="confirmDelete({{ user.id }})" class="delete-btn">
Delete
</a>

{% endif %}

</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
