{% extends "base.html" %}

{% block content %}

<h2>Patient Records</h2>

<a href="/add_patient">Add Patient</a>

<table border="1">

<tr>
<th>ID</th>
<th>Age</th>
<th>Sex</th>
<th>BP</th>
<th>Cholesterol</th>
</tr>

{% for patient in patients %}

<tr>
<td>{{ patient.patient_id }}</td>
<td>{{ patient.age }}</td>
<td>{{ patient.sex }}</td>
<td>{{ patient.blood_pressure }}</td>
<td>{{ patient.cholesterol }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
