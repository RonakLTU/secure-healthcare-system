{% extends "base.html" %}

{% block content %}

<div class="form-container">

<h2>Add Patient Medical Record</h2>

<form method="POST">

<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<label>Select Patient</label>

<select name="patient_email" required>

{% for patient in patients %}

<option value="{{ patient.email }}">
{{ patient.name }} ({{ patient.email }})
</option>

{% endfor %}

</select>


<label>Age</label>
<input type="number" name="age" min="1" max="120" required>

<label>Sex</label>
<select name="sex">
<option>Male</option>
<option>Female</option>
</select>

<label>Blood Pressure</label>
<input type="number" name="blood_pressure">

<label>Cholesterol</label>
<input type="number" name="cholesterol">

<label>Fasting Blood Sugar</label>
<select name="fasting_blood_sugar">
<option>Yes</option>
<option>No</option>
</select>

<label>Resting ECG</label>
<select name="resting_ecg">
<option>Normal</option>
<option>Abnormal</option>
</select>

<label>Exercise Angina</label>
<select name="exercise_angina">
<option>Yes</option>
<option>No</option>
</select>

<button type="submit">Save Record</button>

</form>

</div>

{% endblock %}
