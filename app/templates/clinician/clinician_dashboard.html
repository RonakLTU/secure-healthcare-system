{% extends "base.html" %}

{% block content %}

<div class="clinician-dashboard">



    <div class="clinician-left">
        <h2>Clinician Panel</h2>

        {% if request.args.get('success') %}
        <div class="success-message" id="successMsg">
            {{ request.args.get('success') }}
        </div>

        <script>
        setTimeout(function(){
            const msg = document.getElementById("successMsg");
            if(msg){
                msg.style.display = "none";
            }
        }, 2000); // 2 seconds
        </script>
        {% endif %}

        <p>Manage patient records and appointments</p>

        <a href="/add_patient" class="clinician-btn">Add Patient</a>
        <a href="/patients" class="clinician-btn">View All Patients</a>
        <a href="/appointments" class="clinician-btn">Appointments</a>
    </div>

    <div class="clinician-right">
        <img src="{{ url_for('static', filename='img/clinician_dashboard.png') }}"> 
    </div>

</div>

{% endblock %}
